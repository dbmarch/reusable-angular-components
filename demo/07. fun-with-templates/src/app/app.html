<ng-template #myTemplate let-title let-color="foreground">
  <h1 [style.color]="color">{{title}}</h1>
</ng-template>

<ng-container
  *ngTemplateOutlet="myTemplate; context: {$implicit: 'Hello', foreground: 'green'}"
/>

<ng-container
  *ngTemplateOutlet="myTemplate; context: {$implicit: 'World', foreground: 'blue'}"
/>

<ng-container
  *ngTemplateOutlet="myTemplate; context: {$implicit: 'Templates', foreground: 'purple'}"
/>
