<h1>Structural Directives Sample</h1>
<ul>
  <div class="settings">
    <div class="interval-setting">
      <label>Interval</label>
      <button (click)="decrementInterval()">-</button>
      <span>{{ int() }}</span>
      <button (click)="incrementInterval()">+</button>
    </div>
    <div class="step-setting">
      <label>Step</label>
      <button (click)="decrementStep()">-</button>
      <span>{{ step() }}</span>
      <button (click)="incrementStep()">+</button>
    </div>
  </div>

  <div
    *myTimer="int(); from: 1; to: 10; step: step(); let v = value; let s = state"
    class="content-presenter"
  >
    <h2>Timer Status: {{ s }}</h2>
    <h2>Timer Value: {{ v }}</h2>
  </div>

  <div class="content-presenter">
    <h2>Timer Status: done</h2>
    <h2>Timer Value: 12</h2>
  </div>
</ul>
